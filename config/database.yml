default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= Rails.application.credentials.fetch(:DATABASE_URL) %>
  prepared_statements: false # Required for Supabase transaction pooler (pgBouncer)

development:
  <<: *default

test:
  <<: *default
  database: therasaurus_rails_test

production:
  <<: *default
